name: Deploy to Hostinger

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@6.0.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          directory: /home/u415107443/domains/elipereira.com/crm
          port: 21
          timeout: 30
          forced: true
          exclude: |
            .git/
            .github/
            *.md
            scripts/
            node_modules/
            .env*
            .gitignore