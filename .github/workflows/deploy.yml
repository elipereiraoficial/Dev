name: Deploy to Hostinger

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-action@v4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          directory: ${{ secrets.FTP_DIRECTORY }}
          port: 21
          timeout: 30
          forced: true
          exclude: |
            .git/
            .github/
            *.md
            scripts/
            tests/
            node_modules/
            .env*
            .gitignore