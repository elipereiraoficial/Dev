name: Deploy to Hostinger

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Generate/Update MEMORIA.md
        run: |
          php scripts/generate_memoria.php
          # Commit and push if MEMORIA.md changed
          if ! git diff --quiet --exit-code MEMORIA.md; then
            git config user.name "github-actions[bot]"
            git config user.email "actions@github.com"
            git add MEMORIA.md
            git commit -m "docs: auto-update MEMORIA.md (generated by workflow) [skip ci]"
            git push origin HEAD:master
          fi

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@6.0.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          directory: /home/u415107443/domains/elipereira.com/crm
          port: 21
          timeout: 30
          forced: true
          exclude: |
            .git/
            .github/
            scripts/
            node_modules/
            .env*
            .gitignore
